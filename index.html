<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>นามบัตรออนไลน์ของฉัน</title>
 
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
 
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="card">
    <img class="card__avatar" src="https://avatars.githubusercontent.com/u/9919?v=4" alt="รูปโปรไฟล์">
    
    <h1 id="card-name" class="card__name"> </h1>
    
    <p class="card__title">นักศึกษาวิศวกรรมคอมพิวเตอร์</p>
    <p class="card__bio">กำลังเรียนรู้ Full-stack Development และ DevOps</p>
 
    <ul class="card__links">
      <li><a href="https://github.com/thanawatbo-ops">GitHub</a></li>
      <li><a href="mailto:thanawat.bo@ksu.ac.th">Email</a></li>
    </ul>
 
    <div style="margin: 15px 0;">
      <input type="text" id="name-input" placeholder="พิมพ์ชื่อใหม่ตรงนี้..." style="padding: 8px 12px; border-radius: 6px; border: 1px solid #ccc; width: 80%; font-family: 'Noto Sans Thai', sans-serif; text-align: center;">
    </div>

    <button id="theme-toggle" class="card__button">🌙 โหมดกลางคืน</button>
 
    <p class="card__test-text" style="margin-top: 15px; font-size: 0.95rem; color: #555;">ทดสอบวิชาหัวข้อซอฟต์แวร์ไปให้สุด</p>
 
    <footer id="card-footer" class="card__footer"></footer>
  </main>
 
  <script src="./script.js"></script>
</body>
</html>
